<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1584">
  <title>Ian Kirk — LinkedIn Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: #000;
    }

    .banner {
      width: 1584px;
      height: 396px;
      background: #07090c;
      position: relative;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      overflow: hidden;
    }

    /* ── BACKGROUND LAYERS ── */

    /* Subtle dot grid — fades toward center-right */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(191,255,0,0.055) 1px, transparent 1px);
      background-size: 30px 30px;
      mask-image: radial-gradient(ellipse 60% 100% at 15% 50%, black 0%, transparent 80%);
      z-index: 0;
      pointer-events: none;
    }

    /* Very faint diagonal scan lines — tech feel */
    .bg-lines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 18px,
        rgba(191,255,0,0.012) 18px,
        rgba(191,255,0,0.012) 19px
      );
      z-index: 0;
      pointer-events: none;
    }

    /* ── TOP ACCENT BAR ── */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg,
        rgba(191,255,0,0.6) 0%,
        #bfff00 8%,
        #bfff00 70%,
        rgba(191,255,0,0.3) 85%,
        transparent 100%
      );
      z-index: 10;
    }

    /* ── PROFILE PIC GLOW SYSTEM ── */

    /* Broad outer aurora — soft lime sunrise from bottom-left */
    .pic-aurora {
      position: absolute;
      left: -60px;
      bottom: -120px;
      width: 560px;
      height: 560px;
      background: radial-gradient(circle at 50% 50%,
        rgba(191,255,0,0.22) 0%,
        rgba(191,255,0,0.12) 20%,
        rgba(191,255,0,0.05) 45%,
        transparent 65%
      );
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
    }

    /* Mid glow — tighter, brighter */
    .pic-mid {
      position: absolute;
      left: 76px;
      bottom: 0;
      transform: translateX(-50%);
      width: 320px;
      height: 320px;
      background: radial-gradient(circle at 50% 100%,
        rgba(191,255,0,0.45) 0%,
        rgba(191,255,0,0.18) 25%,
        rgba(191,255,0,0.06) 50%,
        transparent 70%
      );
      border-radius: 50%;
      z-index: 2;
      pointer-events: none;
    }

    /* Circular ring — traces the profile pic edge */
    .pic-ring {
      position: absolute;
      /* Profile pic center: x≈76, y≈396 (banner bottom) */
      left: 76px;
      bottom: 0;
      transform: translateX(-50%) translateY(50%);
      width: 168px;
      height: 168px;
      border-radius: 50%;
      border: 2px solid rgba(191,255,0,0.65);
      box-shadow:
        0 0 16px rgba(191,255,0,0.55),
        0 0 40px rgba(191,255,0,0.25),
        inset 0 0 20px rgba(191,255,0,0.08);
      z-index: 3;
      pointer-events: none;
    }

    /* ── RIGHT SIDE GLOW ── */
    .right-glow {
      position: absolute;
      right: -80px;
      top: -60px;
      width: 440px;
      height: 440px;
      background: radial-gradient(circle,
        rgba(191,255,0,0.04) 0%,
        transparent 65%
      );
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
    }

    /* ── MAIN CONTENT ── */
    .content {
      position: absolute;
      left: 240px;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 72px 0 56px;
    }

    /* Name + role row */
    .identity {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .identity-name {
      font-size: 26px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .identity-sep {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(191,255,0,0.5);
      flex-shrink: 0;
    }

    .identity-role {
      font-size: 11px;
      font-weight: 500;
      color: rgba(191,255,0,0.65);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Thin divider line */
    .rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg,
        rgba(191,255,0,0.35) 0%,
        rgba(191,255,0,0.08) 60%,
        transparent 100%
      );
      margin-bottom: 24px;
    }

    /* Stats row */
    .stats {
      display: flex;
      align-items: flex-end;
      gap: 0;
    }

    .stat {
      flex: 1;
      padding-right: 48px;
      position: relative;
    }

    .stat:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 24px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg,
        transparent,
        rgba(191,255,0,0.2) 30%,
        rgba(191,255,0,0.2) 70%,
        transparent
      );
    }

    .stat-number {
      font-size: 82px;
      font-weight: 700;
      color: #bfff00;
      line-height: 1;
      letter-spacing: -0.04em;
      text-shadow:
        0 0 20px rgba(191,255,0,0.7),
        0 0 60px rgba(191,255,0,0.3),
        0 0 120px rgba(191,255,0,0.1);
    }

    .stat-label {
      font-size: 10.5px;
      font-weight: 500;
      color: #4a5568;
      margin-top: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── BOTTOM STRIP ── */
    .bottom-strip {
      position: absolute;
      bottom: 18px;
      left: 240px;
      right: 72px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bottom-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .meta-item {
      font-size: 10px;
      font-weight: 500;
      color: rgba(100,116,139,0.7);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .meta-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(191,255,0,0.3);
      flex-shrink: 0;
    }

    .bottom-tagline {
      font-size: 11px;
      font-weight: 400;
      font-style: italic;
      color: rgba(191,255,0,0.4);
      letter-spacing: 0.06em;
    }

    /* ── VERIFIED DOT ── */
    .verified {
      position: absolute;
      top: 20px;
      right: 72px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(100,116,139,0.6);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .verified-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #bfff00;
      box-shadow: 0 0 8px rgba(191,255,0,0.9), 0 0 20px rgba(191,255,0,0.4);
    }
  </style>
</head>
<body>
  <div class="banner">

    <!-- Background -->
    <div class="bg-grid"></div>
    <div class="bg-lines"></div>
    <div class="top-bar"></div>

    <!-- Profile pic glow system -->
    <div class="pic-aurora"></div>
    <div class="pic-mid"></div>
    <div class="pic-ring"></div>

    <!-- Right ambient glow -->
    <div class="right-glow"></div>

    <!-- Verified dot — top right -->
    <div class="verified">
      <div class="verified-dot"></div>
      Airtable Verified
    </div>

    <!-- Main content -->
    <div class="content">
      <div class="identity">
        <div class="identity-name">Ian Ryan Kirk</div>
        <div class="identity-sep"></div>
        <div class="identity-role">Sales Closer &middot; AI Toolbuilder</div>
      </div>

      <div class="rule"></div>

      <div class="stats">
        <div class="stat">
          <div class="stat-number">$568K</div>
          <div class="stat-label">Revenue Generated</div>
        </div>
        <div class="stat">
          <div class="stat-number">218</div>
          <div class="stat-label">Clients Closed</div>
        </div>
        <div class="stat">
          <div class="stat-number">34.3%</div>
          <div class="stat-label">Close Rate</div>
        </div>
      </div>
    </div>

    <!-- Bottom strip -->
    <div class="bottom-strip">
      <div class="bottom-meta">
        <span class="meta-item">Lead Gen Jay</span>
        <div class="meta-dot"></div>
        <span class="meta-item">14 Months</span>
        <div class="meta-dot"></div>
        <span class="meta-item">Oct 2024 – Mar 2026</span>
      </div>
      <div class="bottom-tagline">Still learning. Still closing.</div>
    </div>

  </div>
</body>
</html>
