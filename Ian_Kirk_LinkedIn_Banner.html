<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1584">
  <title>Ian Kirk — LinkedIn Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: #000;
    }

    .banner {
      width: 1584px;
      height: 396px;
      background: #090b10;
      position: relative;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      overflow: hidden;
    }

    /* Dot grid */
    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(191,255,0,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
    }

    /* Lime top bar */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, #bfff00 20%, #bfff00 80%, transparent 100%);
      z-index: 2;
    }

    /* Bottom bar */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(191,255,0,0.2) 30%, rgba(191,255,0,0.2) 70%, transparent 100%);
      z-index: 2;
    }

    /* Profile pic glow — centered exactly where LinkedIn places the profile photo */
    .left-glow {
      position: absolute;
      left: 76px;   /* profile pic center x */
      bottom: 0px;  /* profile pic bottom edge */
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle at 50% 100%,
        rgba(191,255,0,0.55) 0%,
        rgba(191,255,0,0.25) 15%,
        rgba(191,255,0,0.10) 30%,
        rgba(191,255,0,0.03) 55%,
        transparent 70%
      );
      z-index: 1;
      border-radius: 50%;
      pointer-events: none;
    }

    /* Tight inner ring glow for extra intensity */
    .pic-ring {
      position: absolute;
      left: 76px;
      bottom: 0px;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 50% 100%,
        rgba(191,255,0,0.35) 0%,
        rgba(191,255,0,0.08) 50%,
        transparent 70%
      );
      z-index: 1;
      border-radius: 50%;
      pointer-events: none;
    }

    /* Right glow */
    .right-glow {
      position: absolute;
      right: -60px;
      top: -60px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle at center, rgba(191,255,0,0.05) 0%, transparent 65%);
      z-index: 1;
      border-radius: 50%;
    }

    /* Vertical divider lines between stats */
    .divider {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 100px;
      background: linear-gradient(180deg, transparent, rgba(191,255,0,0.2), transparent);
      z-index: 3;
    }

    /* Main layout — full width, content pinned to TOP half */
    .content {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 30px 80px 0 80px;
    }

    /* Brand tag at top */
    .brand-tag {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .brand-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #bfff00;
      box-shadow: 0 0 10px rgba(191,255,0,0.9);
      flex-shrink: 0;
    }

    .brand-text {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(191,255,0,0.7);
    }

    .brand-sep {
      width: 1px;
      height: 12px;
      background: rgba(191,255,0,0.25);
    }

    /* Stats row */
    .stats {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .stat {
      flex: 1;
      padding: 0 40px 0 0;
      position: relative;
    }

    .stat:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 72px;
      background: linear-gradient(180deg, transparent, rgba(191,255,0,0.18), transparent);
    }

    .stat-number {
      font-size: 72px;
      font-weight: 700;
      color: #bfff00;
      line-height: 1;
      letter-spacing: -0.04em;
      text-shadow:
        0 0 40px rgba(191,255,0,0.5),
        0 0 100px rgba(191,255,0,0.15);
    }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      color: #6b7a8d;
      margin-top: 8px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    /* Tagline — bottom right */
    .tagline {
      position: absolute;
      bottom: 22px;
      right: 80px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(138,155,176,0.55);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tagline::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      background: #bfff00;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(191,255,0,0.8);
    }

    /* Name + role row — sits at very top above stats */
    .identity-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 18px;
    }

    .identity-name {
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.01em;
    }

    .identity-role {
      font-size: 11px;
      font-weight: 500;
      color: rgba(107,122,141,0.9);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="top-bar"></div>
    <div class="bottom-bar"></div>
    <div class="left-glow"></div>
    <div class="pic-ring"></div>
    <div class="right-glow"></div>

    <!-- Main content — all in the top zone -->
    <div class="content">
      <div class="identity-row">
        <div class="identity-name">Ian Ryan Kirk</div>
        <div class="identity-role">Sales Closer &middot; AI Toolbuilder</div>
      </div>

      <div class="brand-tag">
        <div class="brand-dot"></div>
        <div class="brand-text">Lead Gen Jay</div>
        <div class="brand-sep"></div>
        <div class="brand-text">14 Months</div>
        <div class="brand-sep"></div>
        <div class="brand-text">Airtable Verified</div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-number">$568K</div>
          <div class="stat-label">Revenue Generated</div>
        </div>
        <div class="stat">
          <div class="stat-number">218</div>
          <div class="stat-label">Clients Closed</div>
        </div>
        <div class="stat">
          <div class="stat-number">34.3%</div>
          <div class="stat-label">Close Rate</div>
        </div>
      </div>
    </div>

    <div class="tagline">Still learning. Still closing.</div>
  </div>
</body>
</html>
