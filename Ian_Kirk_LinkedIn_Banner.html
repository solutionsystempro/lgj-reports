<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1584">
  <title>Ian Kirk — LinkedIn Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: #000;
    }

    .banner {
      width: 1584px;
      height: 396px;
      background: #090b10;
      position: relative;
      display: flex;
      align-items: center;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      overflow: hidden;
    }

    /* Dot grid texture */
    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(191,255,0,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: 0;
    }

    /* Lime top bar */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, #bfff00 20%, #bfff00 80%, transparent 100%);
      z-index: 2;
    }

    /* Profile pic glow zone — left side */
    .left-glow {
      position: absolute;
      left: -60px;
      bottom: -80px;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle at center, rgba(191,255,0,0.10) 0%, rgba(191,255,0,0.03) 50%, transparent 75%);
      z-index: 1;
      border-radius: 50%;
    }

    /* Main center glow behind stats */
    .center-glow {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-20%, -50%);
      width: 900px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(191,255,0,0.05) 0%, transparent 70%);
      z-index: 1;
    }

    /* Content wrapper — pushed right of profile pic area */
    .content {
      position: relative;
      z-index: 3;
      width: 100%;
      display: flex;
      align-items: center;
      padding: 0 80px 0 280px;
      gap: 0;
    }

    /* Left: Name + title */
    .identity {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 260px;
      padding-right: 56px;
      border-right: 1px solid rgba(255,255,255,0.10);
    }

    .identity .name {
      font-size: 30px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.01em;
      line-height: 1.1;
      white-space: nowrap;
    }

    .identity .role {
      font-size: 13px;
      font-weight: 400;
      color: #8a9bb0;
      margin-top: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .identity .tagline {
      font-size: 13px;
      font-weight: 400;
      color: rgba(191,255,0,0.65);
      margin-top: 14px;
      letter-spacing: 0.06em;
      font-style: italic;
    }

    /* Stats block */
    .stats {
      display: flex;
      align-items: center;
      flex: 1;
      padding-left: 56px;
      gap: 0;
    }

    .stat {
      flex: 1;
      text-align: center;
      position: relative;
      padding: 0 16px;
    }

    .stat:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 56px;
      background: rgba(255,255,255,0.10);
    }

    .stat .number {
      font-size: 68px;
      font-weight: 700;
      color: #bfff00;
      line-height: 1;
      letter-spacing: -0.03em;
      text-shadow:
        0 0 30px rgba(191,255,0,0.45),
        0 0 80px rgba(191,255,0,0.15);
    }

    .stat .label {
      font-size: 11.5px;
      font-weight: 500;
      color: #8a9bb0;
      margin-top: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Bottom-right verified tag */
    .verified {
      position: absolute;
      bottom: 22px;
      right: 80px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(138,155,176,0.70);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 3;
    }

    .verified::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #bfff00;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(191,255,0,0.8);
    }

    /* Bottom-left: subtle context line */
    .context {
      position: absolute;
      bottom: 22px;
      left: 280px;
      font-size: 11px;
      font-weight: 400;
      color: rgba(138,155,176,0.45);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="top-bar"></div>
    <div class="left-glow"></div>
    <div class="center-glow"></div>

    <div class="content">
      <div class="identity">
        <div class="name">Ian Ryan Kirk</div>
        <div class="role">Sales Closer &middot; AI Toolbuilder</div>
        <div class="tagline">48. Still learning. Still closing.</div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="number">$568K</div>
          <div class="label">Revenue Generated</div>
        </div>
        <div class="stat">
          <div class="number">218</div>
          <div class="label">Clients Closed</div>
        </div>
        <div class="stat">
          <div class="number">34.3%</div>
          <div class="label">Close Rate</div>
        </div>
      </div>
    </div>

    <div class="context">14 Months &middot; Lead Gen Jay</div>
    <div class="verified">Airtable Verified</div>
  </div>
</body>
</html>
