<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1584">
  <title>Ian Kirk — LinkedIn Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1584px; height: 396px; overflow: hidden; background: #000; }

    .banner {
      width: 1584px;
      height: 396px;
      background: #080a0f;
      position: relative;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    /* Subtle dot grid — fades out rightward */
    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(191,255,0,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(90deg, black 0%, black 25%, transparent 60%);
      z-index: 0;
    }

    /* Top lime bar */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, rgba(191,255,0,0) 0%, #bfff00 15%, #bfff00 75%, rgba(191,255,0,0) 100%);
      z-index: 10;
    }

    /* ── PROFILE PIC GLOW — left zone only ── */
    /* Broad aurora */
    .aurora {
      position: absolute;
      left: -80px; bottom: -140px;
      width: 620px; height: 620px;
      background: radial-gradient(circle,
        rgba(191,255,0,0.18) 0%,
        rgba(191,255,0,0.07) 35%,
        transparent 60%
      );
      border-radius: 50%;
      z-index: 1;
    }

    /* Tight glow centered on pic */
    .pic-glow {
      position: absolute;
      left: 180px; bottom: 0;
      transform: translateX(-50%);
      width: 340px; height: 340px;
      background: radial-gradient(circle at 50% 100%,
        rgba(191,255,0,0.5) 0%,
        rgba(191,255,0,0.2) 22%,
        rgba(191,255,0,0.06) 45%,
        transparent 62%
      );
      border-radius: 50%;
      z-index: 2;
    }

    /* Circular ring that traces the profile pic border */
    .pic-ring {
      position: absolute;
      left: 180px; bottom: 0;
      transform: translateX(-50%) translateY(47%);
      width: 190px; height: 190px;
      border-radius: 50%;
      border: 2.5px solid rgba(191,255,0,0.7);
      box-shadow:
        0 0 20px rgba(191,255,0,0.6),
        0 0 50px rgba(191,255,0,0.25),
        inset 0 0 24px rgba(191,255,0,0.06);
      z-index: 3;
    }

    /* ── CONTENT — starts well right of profile pic ── */
    .content {
      position: absolute;
      left: 320px; right: 0;
      top: 0; bottom: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 80px;
      gap: 0;
    }

    /* Name + role */
    .id-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 16px;
    }

    .id-name {
      font-size: 28px;
      font-weight: 700;
      color: #f0f4f8;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .id-pip {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #bfff00;
      box-shadow: 0 0 8px rgba(191,255,0,0.9);
      flex-shrink: 0;
    }

    .id-role {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(191,255,0,0.6);
      white-space: nowrap;
    }

    /* Divider */
    .rule {
      height: 1px;
      background: linear-gradient(90deg, rgba(191,255,0,0.4) 0%, rgba(191,255,0,0.05) 70%, transparent 100%);
      margin-bottom: 22px;
    }

    /* Stats */
    .stats {
      display: flex;
      align-items: flex-end;
      gap: 0;
    }

    .stat {
      flex: 1;
      position: relative;
    }

    .stat:not(:last-child) {
      padding-right: 48px;
      margin-right: 0;
    }

    .stat:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 24px;
      top: 8px;
      bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, rgba(191,255,0,0.25), rgba(191,255,0,0.05));
    }

    .stat-num {
      font-size: 92px;
      font-weight: 700;
      color: #bfff00;
      line-height: 1;
      letter-spacing: -0.045em;
      text-shadow:
        0 0 18px rgba(191,255,0,0.75),
        0 0 50px rgba(191,255,0,0.35),
        0 0 110px rgba(191,255,0,0.12);
    }

    .stat-lbl {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #3d4f63;
      margin-top: 10px;
    }

    /* Bottom meta strip */
    .meta {
      position: absolute;
      bottom: 20px;
      left: 320px; right: 80px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .meta-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .meta-txt {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(61,79,99,0.9);
    }

    .meta-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(191,255,0,0.25);
    }

    .meta-right {
      font-size: 11px;
      font-style: italic;
      font-weight: 400;
      color: rgba(191,255,0,0.3);
      letter-spacing: 0.05em;
    }

    /* Verified badge — top right */
    .verified {
      position: absolute;
      top: 20px; right: 80px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(61,79,99,0.8);
    }

    .v-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #bfff00;
      box-shadow: 0 0 10px rgba(191,255,0,1), 0 0 24px rgba(191,255,0,0.5);
    }
  </style>
</head>
<body>
<div class="banner">
  <div class="top-bar"></div>

  <!-- Profile pic glow zone -->
  <div class="aurora"></div>
  <div class="pic-glow"></div>
  <div class="pic-ring"></div>

  <!-- Verified -->
  <div class="verified"><div class="v-dot"></div>Airtable Verified</div>

  <!-- Main content -->
  <div class="content">
    <div class="id-row">
      <div class="id-name">Ian Ryan Kirk</div>
      <div class="id-pip"></div>
      <div class="id-role">Sales Closer &middot; AI Toolbuilder</div>
    </div>

    <div class="rule"></div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">$568K</div>
        <div class="stat-lbl">Revenue Generated</div>
      </div>
      <div class="stat">
        <div class="stat-num">218</div>
        <div class="stat-lbl">Clients Closed</div>
      </div>
      <div class="stat">
        <div class="stat-num">34.3%</div>
        <div class="stat-lbl">Close Rate</div>
      </div>
    </div>
  </div>

  <!-- Bottom meta -->
  <div class="meta">
    <div class="meta-left">
      <span class="meta-txt">Lead Gen Jay</span>
      <div class="meta-dot"></div>
      <span class="meta-txt">14 Months</span>
      <div class="meta-dot"></div>
      <span class="meta-txt">Oct 2024 – Mar 2026</span>
    </div>
    <div class="meta-right">Still learning. Still closing.</div>
  </div>

</div>
</body>
</html>
